<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('YOUR_BACKGROUND_IMAGE_HERE') no-repeat center center fixed;
      background-size: cover;
    }

    .banner {
      height: 15vh;
      width: 100%;
      background: orange;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .banner img {
      max-height: 100%;
      max-width: 60%;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.2);
      padding: 5px 15px;
      border-radius: 10px;
    }

    /* GRID WITH SPACING BETWEEN BOXES */
    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 42.5vh);
      width: 100vw;
      height: 85vh;
      gap: 10px;              /* space between boxes */
      padding: 10px;         /* space from edges */
      box-sizing: border-box;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.4); /* border between boxes */
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.3);
    }

    /* IMAGE FIX: ALWAYS FITS */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* key change */
      background: black;     /* fills empty space if image doesn't match ratio */
      display: block;
    }

    .info {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px;
      box-sizing: border-box;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      margin-top: 5px;
      color: #00ff88;
    }
  </style>
</head>

<body>

<div class="banner">
  <img src="ban.png" alt="banner">
</div>

<div class="container">

  <div class="card">
    <img src="prop1.png">
    <div class="info">
      <div class="name">Item 1</div>
      <div class="price">$10</div>
    </div>
  </div>

  <div class="card">
    <img src="prop2.png">
    <div class="info">
      <div class="name">Item 2</div>
      <div class="price">$15</div>
    </div>
  </div>

  <div class="card">
    <img src="prop3.png">
    <div class="info">
      <div class="name">Item 3</div>
      <div class="price">$20</div>
    </div>
  </div>

  <div class="card">
    <img src="prop4.png">
    <div class="info">
      <div class="name">Item 4</div>
      <div class="price">$25</div>
    </div>
  </div>

  <div class="card">
    <img src="prop5.png">
    <div class="info">
      <div class="name">Item 5</div>
      <div class="price">$30</div>
    </div>
  </div>

  <div class="card">
    <img src="prop6.png">
    <div class="info">
      <div class="name">Item 6</div>
      <div class="price">$35</div>
    </div>
  </div>

  <div class="card">
    <img src="prop7.png">
    <div class="info">
      <div class="name">Item 7</div>
      <div class="price">$40</div>
    </div>
  </div>

  <div class="card">
    <img src="prop8.png">
    <div class="info">
      <div class="name">Item 8</div>
      <div class="price">$45</div>
    </div>
  </div>

</div>

</body>
</html>
