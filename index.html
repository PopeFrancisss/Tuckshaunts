<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('YOUR_BACKGROUND_IMAGE_HERE') no-repeat center center fixed;
      background-size: cover;
    }

    /* ORANGE BANNER (KEPT) */
    .banner {
      height: 15vh;
      width: 100%;
      background: orange; /* your orange bar */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* FIXED IMAGE (NO BOX) */
    .banner img {
      max-height: 100%;
      max-width: 80%;
      object-fit: contain;
      /* NO BACKGROUND HERE */
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      height: 85vh;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.3);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    .info {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px;
      box-sizing: border-box;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      margin-top: 5px;
      color: #00ff88;
    }

    /* BUTTON */
    .buy-btn {
      margin-top: 8px;
      padding: 6px 10px;
      background: #00ff88;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .buy-btn:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

<div class="banner">
  <img src="ban.png" alt="banner">
</div>

<div class="container">

  <div class="card">
    <img src="prop1.png">
    <div class="info">
      <div class="name">Item 1</div>
      <div class="price">$10</div>
      <button class="buy-btn" onclick="location.href='HTML1.html'">View</button>
    </div>
  </div>

  <div class="card">

  <div class="card">

</html>
