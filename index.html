<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Shop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      /* BACKGROUND IMAGE HERE */
      background: url('YOUR_BACKGROUND_IMAGE_HERE') no-repeat center center fixed;
      background-size: cover;
    }

    .banner {
      height: 15vh;
      width: 100%;
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: black;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 42.5vh);
      width: 100vw;
      height: 85vh;
    }

    .card {
      position: relative;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px;
      box-sizing: border-box;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      margin-top: 5px;
      color: #00ff88;
    }
  </style>
</head>
<body>

<!-- BANNER IMAGE HERE -->
<div class="banner">
  <img src="YOUR_BANNER_IMAGE_HERE" alt="banner">
</div>

<div class="container">

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 1</div>
      <div class="price">$10</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 2</div>
      <div class="price">$15</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 3</div>
      <div class="price">$20</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 4</div>
      <div class="price">$25</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 5</div>
      <div class="price">$30</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 6</div>
      <div class="price">$35</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 7</div>
      <div class="price">$40</div>
    </div>
  </div>

  <div class="card">
    <img src="imageX.png" alt="item">
    <div class="info">
      <div class="name">Item 8</div>
      <div class="price">$45</div>
    </div>
  </div>

</div>

</body>
</html>
